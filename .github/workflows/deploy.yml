name: Deploy to GitHub Pages

on:
  # 触发条件：推送到 main 分支
  push:
    branches: [ main ]
  # 手动触发支持
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 设置 Node.js 环境
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # 安装 pnpm（推荐方式）
      - name: Set up pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8 # 可指定 pnpm 的版本，默认是最新版本

      # 验证 pnpm 是否安装成功
      - name: Verify pnpm installation
        run: pnpm --version

      # 安装依赖并构建
      - name: Install dependencies and build
        run: |
          pnpm install
          pnpm run build

      # 上传 dist 文件夹作为工件
      - name: Upload dist folder as artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # 下载工件并部署
      - name: Download artifact for deployment
        uses: actions/download-artifact@v4
        with:
          name: github-pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
